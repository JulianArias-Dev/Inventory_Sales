version: '3.8'

services:
  db:
    image: mysql:latest
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=Unicesar+2026
      - MYSQL_DATABASE=InventorySales
    ports:  
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  api:
    build: ./InventorySalesAPI
    container_name: dotnet_api
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=InventorySales;Uid=root;Pwd=Unicesar+2026;
    networks:
      - app-network

  frontend:
    build: ./InventorySalesFront
    container_name: InventorySalesfrontend
    ports:
      - "5173:80"
    depends_on:
      - api
    environment:
      - BACKEND_URL=http://api:8080
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
